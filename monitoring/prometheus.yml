global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: tanaghum-backend
    metrics_path: /ops/prometheus
    bearer_token_file: /run/secrets/ops_metrics_token
    static_configs:
      - targets:
          - app:4000
