global:
  resolve_timeout: 5m

route:
  receiver: external-operations
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: external-operations
    webhook_configs:
      - url_file: /run/secrets/alert_webhook_url
        send_resolved: true
